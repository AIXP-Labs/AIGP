name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --quiet "jsonschema>=4" "pytest>=8"
      - name: Run release check
        shell: pwsh
        run: ./scripts/release_check.ps1 -IncludePytest
      - name: Check generated artifacts are committed
        run: git diff --exit-code
      - name: Check no untracked artifacts were generated
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all)"
          test -z "$status" || { echo "$status"; exit 1; }
      - name: Check whitespace errors
        run: git diff-tree --check --root -r HEAD
